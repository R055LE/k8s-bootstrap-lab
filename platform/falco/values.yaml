# Falco umbrella chart values.
# Runtime threat detection DaemonSet. Uses modern_ebpf probe (requires kernel
# >= 5.8 — WSL2 kernel 6.6 satisfies this). Falcosidekick forwards alerts to
# Loki so they appear alongside application logs in Grafana.

falco:
  driver:
    # KNOWN LIMITATION — WSL2 / Kind:
    # Falco requires kernel-level access to attach eBPF probes. On WSL2, the
    # microsoft-standard kernel has no pre-built Falco probe, and compilation
    # requires kernel headers + debugfs that are unavailable inside Kind containers.
    #
    # Result: the Falco DaemonSet will fail to start on WSL2/Kind.
    # This is expected — the configuration is correct for EKS (Phase 4) where
    # Amazon Linux 2 nodes have pre-built probes and full kernel access.
    #
    # What DOES work locally:
    #   - Falcosidekick (running) — Loki destination is wired and ready
    #   - Grafana Falco dashboard — deployed and will populate on EKS
    #
    # To test Falco locally without WSL2, use a Linux VM or Docker Desktop on Linux.
    kind: modern_ebpf

  # Collect container metadata for richer alert context
  collectors:
    enabled: true
    containerd:
      enabled: true
      socket: /run/containerd/containerd.sock
    docker:
      enabled: false

  falco:
    # Enable gRPC so falcosidekick can receive events
    grpc:
      enabled: true
      bind_address: "unix:///run/falco/falco.sock"
      threadiness: 0
    grpc_output:
      enabled: true

    # JSON output for structured logs
    json_output: true
    json_include_output_property: true

  # Falcosidekick — routes Falco alerts to Loki (and other outputs)
  falcosidekick:
    enabled: true
    config:
      loki:
        hostport: "http://loki.logging.svc.cluster.local:3100"
        endpoint: "/loki/api/v1/push"
        # Forward all priority levels — filter in Grafana as needed
        minimumpriority: "debug"
        # Extra labels added to every Loki log entry for easy querying
        customlabels: "source:falco"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
