# kube-prometheus-stack umbrella chart values.
# All keys are scoped under kube-prometheus-stack: (the dependency name).

kube-prometheus-stack:
  grafana:
    # Local dev password — do not use in any internet-facing deployment
    adminPassword: "zero-to-cluster-local"

    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.localhost

    persistence:
      enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # Pre-configure Loki datasource
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.logging.svc.cluster.local:3100
        access: proxy
        isDefault: false

    # Load custom dashboards from ConfigMaps labelled grafana_dashboard=1
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

  prometheus:
    prometheusSpec:
      retention: 24h
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      storageSpec: {}
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
