# ingress-nginx umbrella chart values.
# All keys are scoped under ingress-nginx: (the dependency name in Chart.yaml).

ingress-nginx:
  controller:
    # NodePort service — hostPort binds to the Kind control-plane node's ports
    service:
      type: NodePort

    # Bind directly to host ports 80/443 on the ingress-ready node
    hostPort:
      enabled: true

    # Schedule only on the node labelled ingress-ready=true
    nodeSelector:
      ingress-ready: "true"

    # The control-plane node has a NoSchedule taint — tolerate it
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Equal"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # Admission webhooks cause timeouts in Kind/CI — disable for local clusters
    admissionWebhooks:
      enabled: false

    # Metrics endpoint for Prometheus scraping (wired up in Phase 2)
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false  # Enable in Phase 2 when kube-prometheus-stack is deployed
