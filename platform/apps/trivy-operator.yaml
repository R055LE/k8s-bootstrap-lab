apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitea-admin/zero-to-cluster.git
    targetRevision: main
    path: platform/trivy-operator
    helm:
      releaseName: trivy-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  # Ignore .status.terminatingReplicas — added in k8s 1.31, not yet in ArgoCD schema
  ignoreDifferences:
    - group: apps
      kind: ReplicaSet
      jsonPointers:
        - /status/terminatingReplicas
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status/terminatingReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
