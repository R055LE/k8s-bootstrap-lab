apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port:
                  name: http
