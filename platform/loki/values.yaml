# Loki Helm values — local (Kind) target
#
# SingleBinary mode: one pod handles reads, writes, and storage.
# Uses filesystem storage — fine for local dev, not suitable for production.
# For production: switch to SimpleScalable mode + S3/GCS object storage.

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 5Gi

# Disable distributed mode components — not used in SingleBinary
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable gateway — Promtail talks directly to the Loki service
gateway:
  enabled: false

# Disable object storage backend
minio:
  enabled: false

# Disable canary and tests — not needed for local dev
lokiCanary:
  enabled: false

test:
  enabled: false
