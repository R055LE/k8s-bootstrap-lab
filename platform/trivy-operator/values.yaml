# Trivy Operator umbrella chart values.
# Scans all workloads in the cluster for vulnerabilities, misconfigurations,
# and exposed secrets. Results stored as CRDs (VulnerabilityReport, etc.)
# and exposed as Prometheus metrics.

trivy-operator:
  # Expose metrics for Prometheus scraping
  serviceMonitor:
    enabled: true

  operator:
    vulnerabilityScannerEnabled: true
    configAuditScannerEnabled: true
    # Reduce noise for local dev — disable compliance, SBOM, and secret scanning
    clusterComplianceEnabled: false
    sbomGenerationEnabled: false
    exposedSecretScannerEnabled: false
    # Limit concurrency to avoid trivy DB cache lock contention (trivy 0.69+)
    scanJobsConcurrentLimit: 2
    # Scan all namespaces
    vulnerabilityScannerScanOnlyCurrentRevisions: true

  trivy:
    # Use direct registries — 0.32.1 chart defaults to mirror.gcr.io which
    # is unreliable for trivy-db; override all mirror.gcr.io references.
    image:
      registry: docker.io
    # DB registry split into registry + repo (0.32.1 chart change)
    dbRegistry: ghcr.io
    dbRepository: aquasecurity/trivy-db
    javaDbRegistry: ghcr.io
    javaDbRepository: aquasecurity/trivy-java-db
    # Report all severities
    severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
    # Include unfixed vulnerabilities so we see the full picture
    ignoreUnfixed: false

  # Policy bundle uses its own registry setting
  policiesBundle:
    registry: ghcr.io
    repository: aquasecurity/trivy-checks
    # Scan job container resources — 256Mi minimum to avoid OOMKilled on large images
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Resource limits for scan jobs (runs as batch Jobs, not a long-lived pod)
  scanJob:
    podTemplateSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
