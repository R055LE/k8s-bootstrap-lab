# ArgoCD umbrella chart values.
# All keys are scoped under argo-cd: (the dependency name in Chart.yaml).

argo-cd:
  configs:
    params:
      # TLS terminated at ingress-nginx — run ArgoCD server in insecure mode
      server.insecure: "true"

  server:
    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: argocd.localhost
      tls: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  repoServer:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        # Bumped from 256Mi — repo-server needs headroom to render large charts
        # (kube-prometheus-stack generates ~500 resources)
        memory: 512Mi

  applicationSet:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  notifications:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  redis:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
