# Promtail umbrella chart values.
# All keys are scoped under promtail: (the dependency name in Chart.yaml).

promtail:
  config:
    clients:
      - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
