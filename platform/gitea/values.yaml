# Gitea umbrella chart values.
# All keys are scoped under gitea: (the dependency name in Chart.yaml).
# Note: gitea.gitea is the Gitea application config (DB, admin, server settings).

gitea:
  gitea:
    # Admin credentials sourced from k8s secret created by bootstrap.sh
    admin:
      existingSecret: gitea-admin-secret
    config:
      database:
        DB_TYPE: sqlite3
      server:
        ROOT_URL: http://gitea.localhost
        HTTP_PORT: 3000
      service:
        DISABLE_REGISTRATION: "true"
      repository:
        DEFAULT_BRANCH: main

  service:
    http:
      type: ClusterIP
      port: 3000
    ssh:
      type: ClusterIP
      port: 22

  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: gitea.localhost
        paths:
          - path: /
            pathType: Prefix

  persistence:
    enabled: true
    size: 1Gi

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  postgresql:
    enabled: false

  postgresql-ha:
    enabled: false

  redis-cluster:
    enabled: false

  redis:
    enabled: false
