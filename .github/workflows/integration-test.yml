name: Integration Test

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Full bootstrap integration test.
  # Spins up a Kind cluster, runs the bootstrap script, waits for ArgoCD to
  # sync all applications, and verifies key pods are running.
  # ---------------------------------------------------------------------------
  bootstrap-test:
    name: Bootstrap & verify (Kind)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install Kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          sudo install kind /usr/local/bin/kind

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Raise inotify limits
        run: |
          sudo sysctl -w fs.inotify.max_user_instances=512
          sudo sysctl -w fs.inotify.max_user_watches=1048576

      - name: Bootstrap platform
        run: task bootstrap

      - name: Wait for ArgoCD apps to sync
        run: |
          echo "→ Waiting for ArgoCD applications to sync (up to 10 minutes)..."
          APPS=(
            argocd
            gitea
            ingress-nginx
            kube-prometheus-stack
            loki
            promtail
            trivy-operator
            falco
            sample-app
          )

          for attempt in $(seq 1 60); do
            ALL_HEALTHY=true
            for app in "${APPS[@]}"; do
              health=$(kubectl get application "$app" -n argocd \
                -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
              sync=$(kubectl get application "$app" -n argocd \
                -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")

              if [[ "$health" != "Healthy" ]] || [[ "$sync" != "Synced" ]]; then
                ALL_HEALTHY=false
              fi
            done

            if $ALL_HEALTHY; then
              echo "✓ All applications healthy and synced."
              break
            fi

            if [[ "$attempt" -eq 60 ]]; then
              echo "✗ Timed out waiting for apps. Current status:"
              kubectl get applications -n argocd 2>/dev/null || true
              exit 1
            fi

            sleep 10
          done

      - name: Verify core pods are running
        run: |
          check_pods() {
            local ns="$1"
            local label="$2"
            local name="$3"
            local count
            count=$(kubectl get pods -n "$ns" -l "$label" --no-headers 2>/dev/null | grep -c "Running" || true)
            if [[ "$count" -gt 0 ]]; then
              echo "  ✓ $name ($count pods running)"
            else
              echo "  ✗ $name — no running pods"
              kubectl get pods -n "$ns" -l "$label" 2>/dev/null || true
              return 1
            fi
          }

          FAILED=0

          echo "→ Core components"
          check_pods argocd        "app.kubernetes.io/name=argocd-server"              "argocd-server"              || FAILED=1
          check_pods ingress-nginx "app.kubernetes.io/name=ingress-nginx"              "ingress-nginx"              || FAILED=1
          check_pods gitea         "app.kubernetes.io/name=gitea"                      "gitea"                      || FAILED=1

          echo "→ Observability"
          check_pods monitoring    "app.kubernetes.io/name=prometheus"                 "prometheus"                 || FAILED=1
          check_pods monitoring    "app.kubernetes.io/name=grafana"                    "grafana"                    || FAILED=1
          check_pods logging       "app.kubernetes.io/name=loki"                       "loki"                       || FAILED=1
          check_pods logging       "app.kubernetes.io/name=promtail"                   "promtail"                   || FAILED=1

          echo "→ Security"
          check_pods trivy-system  "app.kubernetes.io/name=trivy-operator"             "trivy-operator"             || FAILED=1
          check_pods falco         "app.kubernetes.io/name=falcosidekick"              "falcosidekick"              || FAILED=1

          echo "→ Workload"
          check_pods sample-app    "app.kubernetes.io/name=sample-app"                 "sample-app"                 || FAILED=1

          if [[ "$FAILED" -ne 0 ]]; then
            echo ""
            echo "✗ Some pods are not running."
            exit 1
          fi

          echo ""
          echo "✓ All pods verified."

      - name: Verify sample app responds
        run: |
          kubectl port-forward svc/sample-app -n sample-app 8888:80 &
          PF_PID=$!
          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/)
          kill $PF_PID 2>/dev/null || true
          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "✓ Sample app returned HTTP $HTTP_STATUS"
          else
            echo "✗ Sample app returned HTTP $HTTP_STATUS (expected 200)"
            exit 1
          fi

      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "=== ArgoCD Applications ==="
          kubectl get applications -n argocd -o wide 2>/dev/null || true
          echo ""
          echo "=== Pods (all namespaces) ==="
          kubectl get pods -A 2>/dev/null || true
          echo ""
          echo "=== Events (last 50) ==="
          kubectl get events -A --sort-by='.lastTimestamp' 2>/dev/null | tail -50 || true

      - name: Teardown
        if: always()
        run: task destroy
